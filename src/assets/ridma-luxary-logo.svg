<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ridma Luxary logo</title>
  <desc id="desc">Ridma Luxary shopping logo with monogram, bag, and tagline.</desc>
  <defs>
